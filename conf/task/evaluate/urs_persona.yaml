package: evaluate
name: urs_persona
entry_point: pipeline.evaluate.urs.urs


dataset:
  path: ${oc.env:DATA_ROOT}/URS/URS_dataset.csv
  user_intention: "Ask_for_Advice"
  language: "EN"
  user_profile_path: ${oc.env:PWD}/persistent_data/user_profile/twitter/summary_deduped_single_tweet_persona.csv

maximum_persona_number: 50
maximum_question_number: 100

prompt: 
  base: |
    You are a helpful assistant.
    You will be given a user's profile and the user's question and you need to provide personised response based on the user's profile.
    User Name: TEMPLATE_USER_NAME
    User Profile: TEMPLATE_USER_PROFILE
    Question: TEMPLATE_QUESTION

  use_user_profile: True